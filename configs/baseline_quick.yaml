seed: 42

paths:
  train_csv: data/train/train.csv
  dev_csv: data/dev/dev.csv
  audio_root: data
  output_dir: outputs/baseline_quick

train:
  batch_size: 16
  num_workers: 0
  epochs: 1
  learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip: 5.0
  device: auto
  print_every: 100
  use_amp: true
  augment:
    gain_prob: 0.5
    gain_db_min: -6.0
    gain_db_max: 6.0
    noise_prob: 0.3
    noise_std_min: 0.001
    noise_std_max: 0.01
    speed_prob: 0.3
    speed_min_rate: 0.95
    speed_max_rate: 1.05
    spec_augment:
      time_mask_count: 2
      time_mask_max_frames: 12
      freq_mask_count: 2
      freq_mask_max_bins: 8

model:
  sample_rate: 16000
  n_fft: 400
  win_length: 400
  hop_length: 160
  n_mels: 80
  conv_channels: 192
  encoder_dim: 256
  hidden_size: 256
  num_gru_layers: 3
  dropout: 0.2
